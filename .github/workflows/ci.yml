name: CI/CD Pipeline

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']
    types: [opened, synchronize]

jobs:
  # --- Vaihe 1: Testaa ja buildaa ---
  # Ajetaan aina sekä push- että pull_request-tapahtumilla
  ci-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Check style front
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Epäonnistuu vain High- tai Critical-tason haavoittuvuuksista
      - name: Security audit
        run: npm audit --audit-level=high

      # Tallentaa build/-kansion GitHub Actionsin välivarastoon jotta
      # deploy-job voi ladata sen ilman uutta buildia
      - name: Upload build artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: build/

  # --- Vaihe 2: Deploy backendiin ---
  # Ajetaan vain master-pushilla, ei PR:issä eikä jos commitviestissä on #skip
  deploy:
    needs: [ci-build-and-test]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '#skip')
    steps:
      # Lataa ci-build-and-test-jobin tallennetun buildin
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: build/

      # Kloonaa backend-repo johon frontend-build kopioidaan
      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: vsvala/Art_Club_back
          token: ${{ secrets.BACKEND_REPO_TOKEN }}
          path: backend

      # Korvaa backendin vanha build uudella
      - name: Copy build to backend
        run: |
          rm -rf backend/build
          cp -r build backend/build

      # Commitoi ja pushaa build backendiin — laukaisee Renderin deployn
      - name: Commit and push build to backend
        run: |
          cd backend
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add build
          git diff --staged --quiet || git commit -m "deploy: frontend build from Art_Club@${{ github.sha }}"
          git push
