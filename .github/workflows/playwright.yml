name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: vsvala/Art_Club_back
          token: ${{ secrets.BACKEND_REPO_TOKEN }}
          path: backend

      - name: Install backend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
        working-directory: backend

      - name: Start backend
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/artclub_test
          SECRET: ${{ secrets.TEST_SECRET }}
          TEST_SECRET: ${{ secrets.TEST_SECRET }}
          PORT: 3001
        run: nohup npm run start:test > backend.log 2>&1 &

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start frontend
        env:
          BROWSER: none
          CI: false
        run: nohup npm run dev > frontend.log 2>&1 &

      - name: Wait for servers
        run: npx wait-on http://localhost:3000 tcp:3001 --timeout 120000

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_API_URL: http://127.0.0.1:3001/api
          PLAYWRIGHT_FRONTEND_URL: http://127.0.0.1:3000
        run: npx playwright test

      - name: Show backend logs on failure
        if: failure()
        working-directory: backend
        run: tail -n 200 backend.log || true

      - name: Show frontend logs on failure
        if: failure()
        run: tail -n 200 frontend.log || true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
